x-default-cfg: &default-cfg
  #network_mode: bridge
  restart: always
  env_file:
    - .env

x-common-volumes: &default-volumes

networks:
  appnet:
  dbnet:

volumes:
  postgres-data:

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    env_file:
      - .env
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./apps/nginx/templates/proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - web-app-1
      - server-app-1
    networks: [appnet]

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?err}
      POSTGRES_USER: ${POSTGRES_USER:?err}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [dbnet]

  web-app-1:
    <<: *default-cfg
    build:
      target: runner
      args: 
        - PROJECT=web-app-1
    container_name: ${WEB_APP_1_NAME:?err}
    #volumes:
    environment:
      - NODE_ENV=production
    networks: [appnet]

  server-app-1:
    <<: *default-cfg
    build:
      target: runner
      args: 
        - PROJECT=server-app-1
    container_name: ${SERVER_APP_1_NAME:?err}
    environment:
      - NODE_ENV=production
    networks: [appnet, dbnet]

#  ${SERVER_APP_1_NAME:?err}:
